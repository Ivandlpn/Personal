<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precio de Bitcoin - Millonario Style</title>
    <style>
        body {
            background: linear-gradient(45deg, #ffcc00, #ff6600, #ff0066, #6600cc);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            color: white;
            padding: 50px 0;
            margin: 0;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btc-logo {
            width: 100px;
            margin: 20px 0;
        }

        .price {
            font-size: 3em;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
            margin: 30px 0;
        }

        button {
            padding: 15px 30px;
            font-size: 1.5em;
            background-color: #ff9900;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #ff6600;
            transform: scale(1.1);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Bienvenido al mundo de los millonarios!</h1>
        <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" alt="Bitcoin Logo" class="btc-logo">
        <div class="price" id="btcPrice">Cargando...</div>
        <button onclick="updatePrice()">Actualizar Precio</button>
    </div>

    <script>
        async function fetchBitcoinData() {
            const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
            const data = await response.json();
            return data.bitcoin.usd;
        }

        async function updatePrice() {
            const price = await fetchBitcoinData();
            document.getElementById('btcPrice').innerText = `$${price}`;
        }

        // Inicializar con el primer precio
        updatePrice();
    </script>
</body>
</html>
